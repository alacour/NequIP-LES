run: [train, test]

cutoff_radius: 4.5
num_layers: 3
l_max: 1
num_features: 32

model_type_names: [H, O, K, F]
chemical_species: ${model_type_names}

monitored_metric: val0_epoch/weighted_sum

data:
  _target_: nequip.data.datamodule.ASEDataModule
  seed: 456

  split_dataset:
    - file_path: ${oc.env:SCRATCH}/code/les/NewtonNet/scripts/electrolyte_data/train/raw/electrolyte_train.xyz
      train: 0.9
      val: 0.1

  test_file_path: ${oc.env:SCRATCH}/code/les/NewtonNet/scripts/electrolyte_data/test/raw/electrolyte_test.xyz

  transforms:
    - _target_: nequip.data.transforms.ChemicalSpeciesToAtomTypeMapper
      model_type_names: ${model_type_names}
    - _target_: nequip.data.transforms.NeighborListTransform
      r_max: ${cutoff_radius}

  train_dataloader:
    _target_: torch.utils.data.DataLoader
    batch_size: 1
    num_workers: 4
    shuffle: true
  val_dataloader:
    _target_: torch.utils.data.DataLoader
    batch_size: 2
    num_workers: ${data.train_dataloader.num_workers}
  test_dataloader: ${data.val_dataloader}

  stats_manager:
    _target_: nequip.data.CommonDataStatisticsManager
    dataloader_kwargs:
      batch_size: 2
    type_names: ${model_type_names}

trainer:
  _target_: lightning.Trainer
  accelerator: gpu
  devices: 1
  enable_checkpointing: true
  max_epochs: 1000
  max_time: 03:00:00:00
  check_val_every_n_epoch: 1
  log_every_n_steps: 1

  logger:
    _target_: lightning.pytorch.loggers.CSVLogger
    save_dir: outputs/electrolyte_les
    name: run

  callbacks:
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: ${monitored_metric}
      min_delta: 1e-4
      patience: 100

    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      monitor: ${monitored_metric}
      dirpath: outputs/electrolyte_les
      filename: best
      save_last: true

    - _target_: lightning.pytorch.callbacks.LearningRateMonitor
      logging_interval: epoch

training_module:
  _target_: nequip.train.EMALightningModule
  ema_decay: 0.999

  loss:
    _target_: nequip.train.EnergyForceLoss
    per_atom_energy: true
    coeffs:
      total_energy: 1.0
      forces: 1.0

  val_metrics:
    _target_: nequip.train.EnergyForceMetrics
    coeffs:
      total_energy_mae: 1.0
      forces_mae: 1.0

  train_metrics: ${training_module.val_metrics}
  test_metrics: ${training_module.val_metrics}

  optimizer:
    _target_: torch.optim.Adam
    lr: 0.005

  lr_scheduler:
    scheduler:
      _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
      factor: 0.8
      patience: 50
      threshold: 0.2
      min_lr: 1e-6
    monitor: ${monitored_metric}
    interval: epoch
    frequency: 1

  model:
    _target_: nequip_les.model.LESModel
    base_model: nequip

    LES:
      les_args:
        use_atomwise: false
        sigma: 1.0
        dl: 2.0
        remove_mean: true
        epsilon_factor: 1.0
        is_periodic: true
        N_max: 10

    seed: 456
    model_dtype: float32
    type_names: ${model_type_names}
    r_max: ${cutoff_radius}

    num_bessels: 8
    bessel_trainable: true
    polynomial_cutoff_p: 6

    num_layers: ${num_layers}
    l_max: ${l_max}
    parity: false
    num_features: ${num_features}

    radial_mlp_depth: 2
    radial_mlp_width: 64

    avg_num_neighbors: ${training_data_stats:num_neighbors_mean}
    per_type_energy_scales: ${training_data_stats:per_type_forces_rms}
    per_type_energy_shifts: ${training_data_stats:per_atom_energy_mean}
    per_type_energy_scales_trainable: false
    per_type_energy_shifts_trainable: false
